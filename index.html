<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeelPrint Hub | Interactive AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05050a;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 20, 80, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(10, 40, 70, 0.4) 0%, transparent 40%);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Sidebar & Navigation --- */
        .sidebar {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            width: 280px;
            height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            z-index: 50;
        }

        .nav-btn {
            position: relative;
            width: 100%;
            padding: 1rem 1.5rem;
            text-align: left;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #64748b;
            font-size: 0.95rem;
            border: 1px solid transparent;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-btn.active {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: var(--accent-purple);
        }

        /* --- Main Workspace --- */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 3rem;
            overflow-y: auto;
            height: 100vh;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        /* --- Graphics & Canvas --- */
        .canvas-container {
            background: linear-gradient(145deg, #1e1e2e, #0a0a0f);
            border-radius: 30px;
            padding: 12px;
            box-shadow: 20px 20px 60px #050508, -5px -5px 20px rgba(255,255,255,0.02);
        }

        canvas {
            border-radius: 20px;
            width: 160px;
            height: 160px;
            animation: glow-pulse 4s infinite ease-in-out;
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.2)); }
            50% { filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.4)); }
        }

        /* --- Entry Animations --- */
        .entry-animate {
            animation: float-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes float-up {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-accent {
            border-left: 4px solid var(--accent-purple);
        }
        .health-accent { border-left-color: var(--accent-cyan); }
        .qa-accent { border-left-color: #64748b; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-12">
            <h1 class="text-2xl font-bold tracking-tighter">FEEL<span class="text-purple-500">PRINT</span></h1>
            <div class="h-1 w-8 bg-purple-500 mt-1 rounded-full"></div>
        </div>
        
        <nav class="flex-grow">
            <button onclick="switchTab('feelprint', this)" class="nav-btn active"><span>🎨</span> Visualizer</button>
            <button onclick="switchTab('health', this)" class="nav-btn"><span>⚡</span> Health Planner</button>
            <button onclick="switchTab('qa', this)" class="nav-btn"><span>🧠</span> No Expression Zone</button>
        </nav>

        <button onclick="location.reload()" class="mt-auto text-[10px] font-bold text-slate-600 hover:text-slate-200 transition-colors tracking-widest uppercase">
            Reset Session _
        </button>
    </aside>

    <main class="main-content">
        <div class="max-w-3xl mx-auto">
            
            <section id="feelprint" class="tab-content">
                <h2 class="text-4xl font-light mb-8">Current <span class="font-bold">Resonance</span></h2>
                <div class="glass-box p-8 mb-8">
                    <textarea id="moodInput" placeholder="How does your mind feel right now?" 
                        class="w-full bg-transparent text-xl outline-none h-24 resize-none border-none placeholder-slate-700"></textarea>
                    <button onclick="generatePrint()" class="mt-4 px-10 py-3 bg-white text-black font-bold rounded-full hover:bg-purple-400 transition-all uppercase text-xs tracking-widest">Update State</button>
                </div>
                <div id="feelContainer"></div>
            </section>

            <section id="health" class="tab-content hidden">
                <h2 class="text-4xl font-light mb-8">Health <span class="font-bold text-cyan-400">Optimization</span></h2>
                <div class="glass-box p-8 mb-8">
                    <textarea id="healthInput" placeholder="Enter a goal (e.g. Focus, Better Sleep)..." 
                        class="w-full bg-transparent text-xl outline-none h-24 resize-none placeholder-slate-700"></textarea>
                    <button onclick="generateHealthPlan()" class="mt-4 px-10 py-3 bg-cyan-500 text-white font-bold rounded-full hover:bg-cyan-400 transition-all uppercase text-xs tracking-widest">Generate Plan</button>
                </div>
                <div id="healthContainer"></div>
            </section>

            <section id="qa" class="tab-content hidden">
                <h2 class="text-4xl font-light mb-8">No <span class="font-bold text-slate-500">Expression</span></h2>
                <div class="glass-box p-8 mb-8">
                    <input type="text" id="qaInput" placeholder="Ask a direct question..." 
                        class="w-full bg-transparent text-xl outline-none pb-4 border-b border-white/5 placeholder-slate-700">
                    <button onclick="askQuestion()" class="mt-6 px-10 py-3 bg-slate-700 text-white font-bold rounded-full hover:bg-slate-600 transition-all uppercase text-xs tracking-widest">Query System</button>
                </div>
                <div id="qaContainer"></div>
            </section>

        </div>
    </main>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            btn.classList.add('active');
        }

        function generatePrint() {
            const text = document.getElementById('moodInput').value.trim();
            if(!text) return;
            const container = document.getElementById('feelContainer');
            container.innerHTML = ''; 

            const seed = text.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
            const hue = seed % 360;

            const wrap = document.createElement('div');
            wrap.className = "entry-animate flex flex-col md:flex-row gap-10 items-center";
            
            const canvas = document.createElement('canvas');
            canvas.width = 300; canvas.height = 300;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(150,150,0, 150,150,150);
            grad.addColorStop(0, `hsl(${hue}, 80%, 60%)`);
            grad.addColorStop(1, '#05050a');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,300,300);

            wrap.innerHTML = `
                <div class="canvas-container">${canvas.outerHTML}</div>
                <div class="flex-grow">
                    <p class="text-[10px] font-bold text-purple-500 tracking-[0.3em] mb-3">RESONANCE_DATA_01</p>
                    <p class="text-2xl font-light mb-6">"${text}"</p>
                    <div class="glass-box p-6 card-accent">
                        <p class="text-sm text-slate-400 italic">Unique frequency captured. This geometry is a direct derivative of your current thought pattern.</p>
                    </div>
                </div>
            `;
            
            container.appendChild(wrap);
            const newCanvas = container.querySelector('canvas');
            newCanvas.getContext('2d').drawImage(canvas, 0, 0);
            document.getElementById('moodInput').value = '';
        }

        function generateHealthPlan() {
            const text = document.getElementById('healthInput').value.trim().toLowerCase();
            if(!text) return;
            const container = document.getElementById('healthContainer');
            container.innerHTML = '';

            let advice = ["Hydrate: 500ml water", "Posture: 1 min wall-stretch", "Focus: 5 min eyes-closed pause"];
            if(text.includes("sleep")) advice = ["Blue Light: Activate Night Mode", "Temperature: Cool the environment", "Mind: 5 min brain dump journal"];
            if(text.includes("energy")) advice = ["Action: 15 jumping jacks", "Light: Open curtains/Sunlight", "Fuel: High-protein snack"];

            container.innerHTML = `
                <div class="entry-animate glass-box p-8 health-accent">
                    <p class="text-[10px] font-bold text-cyan-400 tracking-widest mb-4">OPTIMIZATION_PROTOCOL</p>
                    <div class="space-y-4">
                        ${advice.map(s => `<p class="flex gap-4"><b>→</b> <span class="text-slate-200">${s}</span></p>`).join('')}
                    </div>
                </div>`;
            document.getElementById('healthInput').value = '';
        }

        function askQuestion() {
            const text = document.getElementById('qaInput').value.trim();
            if(!text) return;
            const container = document.getElementById('qaContainer');
            container.innerHTML = ''; 

            container.innerHTML = `
                <div class="entry-animate glass-box p-8 qa-accent">
                    <p class="text-[10px] font-bold text-slate-500 tracking-widest mb-4">DIRECT_LOGIC_OUTPUT</p>
                    <p class="text-xl text-slate-200 leading-relaxed">
                        Query: "${text}" <br><br>
                        Conclusion: Maximize efficiency by isolating the core variable. Objective tracking suggests that immediate action on the primary obstacle yields 80% of desired results.
                    </p>
                </div>`;
            document.getElementById('qaInput').value = '';
        }
    </script>
</body>
</html>
